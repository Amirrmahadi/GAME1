<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palm Fruit Catcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #4FC3F7;
            touch-action: none; /* Prevents scroll/zoom on mobile */
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake {
            animation: shake 0.3s;
            animation-iteration-count: 1;
        }
    </style>
</head>
<body class="relative">

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD (Score and Lives) -->
    <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-10 opacity-0 transition-opacity duration-300">
        <div class="bg-white/90 backdrop-blur-md px-6 py-3 rounded-2xl shadow-lg border border-white/50 flex flex-col items-center">
            <span class="text-gray-500 text-xs font-black uppercase tracking-widest mb-1">Score</span>
            <span id="hud-score" class="text-4xl font-black text-orange-600 leading-none">0</span>
        </div>
        <div class="bg-white/90 backdrop-blur-md px-4 py-3 rounded-2xl shadow-lg border border-white/50 flex gap-1" id="hud-lives">
            <!-- Hearts injected here -->
        </div>
    </div>

    <!-- UI Overlay (Menu / Game Over) -->
    <div id="ui-layer" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-20 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 shadow-2xl text-center max-w-sm w-full mx-4 border-4 border-orange-500">
            <div class="text-6xl mb-4">🌴🚛🥥</div>
            <h1 class="text-4xl font-extrabold text-orange-600 mb-2 drop-shadow-sm">Palm Fruit<br>Catcher</h1>
            <p class="text-gray-600 mb-6 font-medium">Drag or use arrow keys to move the lorry.<br>Catch as many fruits as you can!</p>
            
            <div id="final-score" class="text-2xl font-bold text-gray-800 hidden mb-6 bg-orange-100 py-3 rounded-xl border border-orange-200">
                Final Score: <span id="score-val" class="text-orange-600 text-4xl ml-2">0</span>
            </div>

            <button id="start-btn" class="w-full bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transform transition active:scale-95 text-2xl uppercase tracking-wider border border-green-700 cursor-pointer">
                Play Now
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const hud = document.getElementById('hud');
        const startBtn = document.getElementById('start-btn');
        const hudScore = document.getElementById('hud-score');
        const hudLives = document.getElementById('hud-lives');
        const finalScoreDiv = document.getElementById('final-score');
        const scoreVal = document.getElementById('score-val');

        // Game State Variables
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let lives = 3;
        let fruits = [];
        let particles = [];
        let clouds = [];
        let frameCount = 0;
        let spawnInterval = 60;
        let bgGrad;
        let flashAlpha = 0;

        // Input State
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };
        let targetX = null;
        let isDragging = false;

        // Player (Lorry)
        let lorry = {
            x: 0,
            y: 0,
            w: 120,
            h: 50,
            speed: 10
        };

        // Initialize Clouds
        for(let i=0; i<6; i++) {
            clouds.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight * 0.4,
                s: Math.random() * 0.5 + 0.5,
                speed: Math.random() * 0.5 + 0.2
            });
        }

        // Handle Resizing
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Recreate Background Gradient
            bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#4FC3F7'); 
            bgGrad.addColorStop(1, '#E1F5FE');

            // Responsive Lorry sizing
            lorry.w = Math.max(120, canvas.width * 0.15);
            lorry.w = Math.min(lorry.w, 200); 
            lorry.h = lorry.w * 0.45;
            lorry.speed = canvas.width * 0.015; // Keyboard speed scaling
            
            // Align to ground level (ground is 50px from bottom)
            lorry.y = canvas.height - 50 - lorry.h * 1.1; 
            
            if (lorry.x + lorry.w > canvas.width) {
                lorry.x = canvas.width - lorry.w;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        // UI Handlers
        function updateLivesUI() {
            hudLives.innerHTML = '';
            for(let i=0; i<3; i++) {
                if (i < lives) {
                    hudLives.innerHTML += `<svg class="w-8 h-8 text-red-500 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                } else {
                    hudLives.innerHTML += `<svg class="w-8 h-8 text-gray-300 drop-shadow-sm" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
                }
            }
        }

        startBtn.addEventListener('click', () => {
            // Setup game variables
            gameState = 'playing';
            score = 0;
            lives = 3;
            fruits = [];
            particles = [];
            frameCount = 0;
            spawnInterval = 60;
            lorry.x = canvas.width/2 - lorry.w/2;
            
            // Update UI 
            hudScore.innerText = score;
            updateLivesUI();
            
            // Hide menu, show HUD
            uiLayer.style.opacity = '0';
            setTimeout(() => uiLayer.style.display = 'none', 300);
            hud.style.opacity = '1';
        });

        function triggerGameOver() {
            gameState = 'gameover';
            
            // Show menu, hide HUD
            uiLayer.style.display = 'flex';
            setTimeout(() => uiLayer.style.opacity = '1', 10);
            hud.style.opacity = '0';
            
            finalScoreDiv.classList.remove('hidden');
            scoreVal.innerText = score;
            startBtn.innerText = "Play Again";
        }

        // Input Event Listeners
        window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Touch & Mouse (Drag logic)
        function handleInputMove(clientX) {
            targetX = clientX;
        }

        canvas.addEventListener('touchstart', e => {
            isDragging = true;
            handleInputMove(e.touches[0].clientX);
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', e => {
            if (isDragging) handleInputMove(e.touches[0].clientX);
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', () => isDragging = false);

        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            handleInputMove(e.clientX);
        });
        canvas.addEventListener('mousemove', e => {
            if (isDragging) handleInputMove(e.clientX);
        });
        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        // Core Game Logic
        function spawnFruit() {
            let r = Math.max(15, canvas.width * 0.02);
            r = Math.min(r, 28); // Cap max radius
            
            let x = Math.random() * (canvas.width - r*2) + r;
            
            // Difficulty scaling
            let baseSpeed = canvas.height * 0.005;
            let extraSpeed = score * (canvas.height * 0.00015);

            fruits.push({
                x: x,
                y: -r,
                r: r,
                speed: baseSpeed + extraSpeed,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1
            });
        }

        function update() {
            if (gameState !== 'playing') return;

            // 1. Move Lorry
            let movingWithKey = false;
            if (keys.ArrowLeft || keys.a) { lorry.x -= lorry.speed; movingWithKey = true; }
            if (keys.ArrowRight || keys.d) { lorry.x += lorry.speed; movingWithKey = true; }

            // Smooth Lerp for Touch/Mouse
            if (!movingWithKey && targetX !== null && isDragging) {
                let diff = targetX - (lorry.x + lorry.w / 2);
                lorry.x += diff * 0.15; 
            }

            // Boundary constraints
            if (lorry.x < 0) lorry.x = 0;
            if (lorry.x + lorry.w > canvas.width) lorry.x = canvas.width - lorry.w;

            // 2. Manage Fruits
            frameCount++;
            if (frameCount >= spawnInterval) {
                spawnFruit();
                frameCount = 0;
                // Gradually increase spawn rate
                spawnInterval = Math.max(20, 60 - Math.floor(score / 3));
            }

            for (let i = fruits.length - 1; i >= 0; i--) {
                let f = fruits[i];
                f.y += f.speed;
                f.rot += f.rotSpeed;

                // Collision with Lorry
                if (f.y + f.r >= lorry.y && f.y - f.r <= lorry.y + lorry.h) {
                    if (f.x + f.r >= lorry.x && f.x - f.r <= lorry.x + lorry.w) {
                        // Caught!
                        score++;
                        hudScore.innerText = score;
                        flashAlpha = 0.3; // Screen flash
                        
                        // Floating Text particle
                        particles.push({ x: f.x, y: f.y, life: 30, maxLife: 30 });
                        
                        fruits.splice(i, 1);
                        continue;
                    }
                }

                // Hit Ground (Missed)
                if (f.y - f.r > canvas.height - 50) {
                    lives--;
                    updateLivesUI();
                    fruits.splice(i, 1);

                    // Screen Shake Effect
                    document.body.classList.remove('shake');
                    void document.body.offsetWidth; // Trigger reflow
                    document.body.classList.add('shake');

                    if (lives <= 0) {
                        triggerGameOver();
                    }
                }
            }
        }

        // Drawing Logic
        function drawFruit(fruit) {
            ctx.save();
            ctx.translate(fruit.x, fruit.y);
            ctx.rotate(fruit.rot);
            
            let r = fruit.r;
            
            // Main fruit body
            ctx.fillStyle = '#FF5722'; 
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI*2);
            ctx.fill();

            // Fruit texture dots (to resemble cluster)
            ctx.fillStyle = '#D84315';
            ctx.beginPath(); ctx.arc(-r*0.3, -r*0.2, r*0.25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(r*0.4, r*0.1, r*0.25, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(-r*0.1, r*0.4, r*0.25, 0, Math.PI*2); ctx.fill();

            // Stem
            ctx.fillStyle = '#33691E';
            ctx.fillRect(-r*0.1, -r*1.1, r*0.2, r*0.4);

            ctx.restore();
        }

        function drawLorry() {
            ctx.save();
            let x = lorry.x;
            let y = lorry.y;
            let w = lorry.w;
            let h = lorry.h;
            
            // Exhaust Pipe
            ctx.fillStyle = '#757575';
            ctx.fillRect(x + w*0.65, y - h*0.3, w*0.05, h*0.5);

            // Trailer Bed (To catch fruits)
            ctx.fillStyle = '#3E2723'; 
            ctx.fillRect(x, y + h*0.3, w*0.7, h*0.5);
            
            // Wooden cage slats
            ctx.strokeStyle = '#5D4037';
            ctx.lineWidth = Math.max(2, w * 0.02);
            for(let i=0; i<=4; i++) {
                ctx.beginPath();
                let slatX = x + (w*0.7/4)*i;
                if (i===4) slatX -= ctx.lineWidth/2;
                if (i===0) slatX += ctx.lineWidth/2;
                ctx.moveTo(slatX, y + h*0.1);
                ctx.lineTo(slatX, y + h*0.8);
                ctx.stroke();
            }
            // Horizontal slat
            ctx.beginPath();
            ctx.moveTo(x, y + h*0.4);
            ctx.lineTo(x + w*0.7, y + h*0.4);
            ctx.stroke();

            // Cabin
            ctx.fillStyle = '#2E7D32'; 
            ctx.beginPath();
            ctx.moveTo(x + w*0.65, y + h*0.8); 
            ctx.lineTo(x + w*0.65, y + h*0.2); 
            ctx.lineTo(x + w*0.85, y + h*0.2); 
            ctx.lineTo(x + w*0.95, y + h*0.4); 
            ctx.lineTo(x + w*1.0, y + h*0.4);  
            ctx.lineTo(x + w*1.0, y + h*0.8);  
            ctx.fill();
            
            // Cabin Window
            ctx.fillStyle = '#81D4FA';
            ctx.beginPath();
            ctx.moveTo(x + w*0.7, y + h*0.25);
            ctx.lineTo(x + w*0.83, y + h*0.25);
            ctx.lineTo(x + w*0.9, y + h*0.4);
            ctx.lineTo(x + w*0.7, y + h*0.4);
            ctx.fill();

            // Wheels
            let drawWheel = (wx, wy, wr) => {
                ctx.fillStyle = '#212121';
                ctx.beginPath(); ctx.arc(wx, wy, wr, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#BDBDBD';
                ctx.beginPath(); ctx.arc(wx, wy, wr*0.4, 0, Math.PI*2); ctx.fill();
            };
            drawWheel(x + w*0.15, y + h*0.85, h*0.25);
            drawWheel(x + w*0.45, y + h*0.85, h*0.25);
            drawWheel(x + w*0.85, y + h*0.85, h*0.25);

            ctx.restore();
        }

        function draw() {
            // Clear Canvas & Background
            ctx.fillStyle = bgGrad || '#4FC3F7';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Sun
            ctx.fillStyle = '#FFF59D';
            ctx.beginPath(); ctx.arc(canvas.width*0.8, canvas.height*0.2, canvas.width*0.05, 0, Math.PI*2); ctx.fill();

            // Draw Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x < -100) { c.x = canvas.width + 100; c.y = Math.random() * canvas.height * 0.4; }
                ctx.beginPath();
                ctx.arc(c.x, c.y, 30*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 25*c.s, c.y - 15*c.s, 35*c.s, 0, Math.PI*2);
                ctx.arc(c.x + 50*c.s, c.y, 30*c.s, 0, Math.PI*2);
                ctx.fill();
            });

            // Draw Ground
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#7CB342';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 15);

            // Draw Game Objects
            fruits.forEach(f => drawFruit(f));
            drawLorry();

            // Flash Effect for catches
            if (flashAlpha > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashAlpha -= 0.05;
            }

            // Draw Particles (+1 Texts)
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.life--;
                p.y -= 2; 
                ctx.fillStyle = `rgba(255, 120, 0, ${p.life / p.maxLife})`; 
                ctx.font = 'bold 30px sans-serif';
                ctx.fillText('+1', p.x, p.y);
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // Main Game Loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize and Start Engine
        window.onload = () => {
            resizeCanvas();
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
